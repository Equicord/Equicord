<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DOOM</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            color: #f5f5f5;
            font-family: system-ui, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #doom-root {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at top, rgb(153 27 27 / 22%), transparent 45%),
                linear-gradient(180deg, #171717 0%, #090909 100%);
        }

        #DOOM > .dosbox-container {
            width: min(960px, 96vw);
            height: min(600px, 78vh);
        }

        #DOOM > .dosbox-container > .dosbox-overlay {
            background: linear-gradient(180deg, rgb(0 0 0 / 45%), rgb(0 0 0 / 72%));
        }

        #DOOM > .dosbox-container > .dosbox-overlay > .dosbox-start {
            margin: 0 auto;
            width: 12rem;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgb(255 255 255 / 10%);
            border: 1px solid rgb(255 255 255 / 14%);
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="doom-root">
        <div id="DOOM" class="dosbox-default"></div>
    </div>
    <script src="./js-dos-api.js"></script>
    <script>
        Dosbox.prototype.downloadScript = function() {
            this.module.setStatus("Downloading js-dos");
            this.ui.updateMessage("Downloading js-dos");
            return new Dosbox.Xhr("./js-dos-v3.js", {
                success: script => {
                    this.ui.updateMessage("Initializing dosbox");
                    setTimeout(() => this._jsdos_init(this.module, script, this.onload), 1000);
                },
                progress: (total, current) => {
                    this.ui.updateMessage(`Downloading js-dos (${current * 100 / total | 0}%)`);
                }
            });
        };

        const doom = new Dosbox({
            id: "DOOM",
            onload: dosbox => {
                window.__doom = dosbox;
                dosbox.run("./DOOM-@evilution.zip", "./DOOM/DOOM.EXE");
            }
        });

        doom.ui.showLoader();
        doom.downloadScript();

        window.addEventListener("message", event => {
            if (event.data === "focus-doom") {
                doom.ui.canvas.focus();
            }
        });
    </script>
</body>
</html>
