name: Build and Release
on:
    workflow_call:
        inputs:
            upload-target:
                description: 'Upload target type'
                type: string
                required: true
            release-tag:
                description: 'Release tag for dated uploads'
                type: string
                required: false
                default: ''
        secrets:
            GITHUB_TOKEN:
                required: true
            ETOKEN:
                required: false

jobs:
    Build:
        name: Build Equicord
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Cache node_modules
              uses: actions/cache@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-node-modules-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              run: pnpm buildWebStandalone

            - name: Build
              run: pnpm buildStandalone

            - name: Generate plugin lists
              run: |
                  pnpm generatePluginJson dist/plugins.json
                  pnpm generateEquicordPluginJson dist/equicordplugins.json
                  pnpm generateVencordPluginJson dist/vencordplugins.json
                  pnpm generateDevsList dist/devs.json

            - name: Collect files to be released
              run: |
                  cd dist
                  mkdir release

                  cp browser/browser.* release
                  cp Equicord.user.{js,js.LEGAL.txt} release

                  # copy the plugin data jsons, the extension zips and the desktop/vesktop asars
                  cp *.{json,zip,asar} release

                  # legacy un-asared files
                  cp desktop/* release
                  for file in equibop/*; do
                    filename=$(basename "$file")
                    cp "$file" "release/equibop${filename^}"
                  done

                  find release -size 0 -delete
                  rm release/package.json
                  rm release/*.map

            - name: Upload Equicord Stable
              if: inputs.upload-target == 'latest'
              run: |
                  gh release upload latest --clobber dist/release/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Equicord Dated Release
              if: inputs.upload-target == 'dated'
              run: |
                  gh release create ${{ inputs.release-tag }} --latest=false
                  gh release upload ${{ inputs.release-tag }} --clobber dist/release/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Plugin JSONs to Equibored repo
              if: inputs.upload-target == 'latest'
              run: |
                  git config --global user.name "GitHub-Actions"
                  git config --global user.email actions@github.com
                  git clone https://GitHub-Actions:${{ secrets.ETOKEN }}@github.com/Equicord/Equibored.git plugins
                  cd plugins

                  cp ../dist/release/*.json .
                  git add -A

                  git commit -m "Plugins for https://github.com/$GITHUB_REPOSITORY/commit/$GITHUB_SHA"
                  git push --force https://GitHub-Actions:${{ secrets.ETOKEN }}@github.com/Equicord/Equibored.git
